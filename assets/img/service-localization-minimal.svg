<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style>
    .globe{transform-box:fill-box;transform-origin:center;animation:turn 7s ease-in-out infinite}.pin{transform-box:fill-box;transform-origin:center;animation:pulse 1.8s ease-in-out infinite}@keyframes turn{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <g class="globe"><circle cx="600" cy="400" r="250" fill="none" stroke="#111" stroke-width="22"/><path d="M350 400h500M600 150c-105 105-105 395 0 500M600 150c105 105 105 395 0 500" fill="none" stroke="#c8102e" stroke-width="22" stroke-linecap="round"/></g>
  <circle class="pin" cx="790" cy="245" r="42" fill="#c8102e"/>
</svg>
