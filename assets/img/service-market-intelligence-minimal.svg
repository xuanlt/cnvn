<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style>
    .glass{transform-box:fill-box;transform-origin:center;animation:scan 4s ease-in-out infinite}.trend{stroke-dasharray:700;stroke-dashoffset:700;animation:draw 3s ease-in-out infinite}.dot{transform-box:fill-box;transform-origin:center;animation:pulse 1.8s ease-in-out infinite}@keyframes scan{0%,100%{transform:translateX(-22px) rotate(-3deg)}50%{transform:translateX(22px) rotate(3deg)}}@keyframes draw{15%,100%{stroke-dashoffset:0}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}.trend{stroke-dashoffset:0}}
  </style>
  <g class="glass"><circle cx="510" cy="360" r="210" fill="none" stroke="#111" stroke-width="28"/><path d="m665 515 210 210" stroke="#111" stroke-width="44" stroke-linecap="round"/></g>
  <path class="trend" d="m350 430 120-120 100 80 130-150" fill="none" stroke="#c8102e" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
  <circle class="dot" cx="700" cy="240" r="36" fill="#c8102e"/>
</svg>
