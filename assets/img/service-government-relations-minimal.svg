<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <style>
    .roof{transform-box:fill-box;transform-origin:center bottom;animation:roof 3.4s ease-in-out infinite}.column{transform-box:fill-box;transform-origin:center bottom;animation:column 2.4s ease-in-out infinite}.c2{animation-delay:.12s}.c3{animation-delay:.24s}.c4{animation-delay:.36s}@keyframes roof{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}@keyframes column{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.9)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <path class="roof" d="m600 150 380 170H220z" fill="#c8102e"/>
  <path d="M280 650h640" fill="none" stroke="#111" stroke-width="34" stroke-linecap="round"/>
  <path class="column" d="M340 350v250" stroke="#111" stroke-width="34" stroke-linecap="round"/>
  <path class="column c2" d="M510 350v250" stroke="#111" stroke-width="34" stroke-linecap="round"/>
  <path class="column c3" d="M690 350v250" stroke="#111" stroke-width="34" stroke-linecap="round"/>
  <path class="column c4" d="M860 350v250" stroke="#111" stroke-width="34" stroke-linecap="round"/>
  <path d="M240 650h720" stroke="#c8102e" stroke-width="34" stroke-linecap="round"/>
</svg>
